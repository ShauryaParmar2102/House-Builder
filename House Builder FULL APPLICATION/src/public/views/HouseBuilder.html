<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Builder</title>
    <link rel="stylesheet" href="styles/styles.css">
</head>

<body>

<h1>House Builder 👷‍♂️</h1>

<nav class="navbar">
    <ul class="nav-list">
        <li><a href="HouseList.html">House List</a></li>
        <li><a href="HouseBuilder.html">House Builder</a></li> 
        <li><a href="showcase.html">Public Showcase</a></li>
    </ul>
</nav>

<form id="houseForm">

    <label>House Name:</label>
    <input type="text" id="name" required><br>

    <label>Storey Count:</label>
    <input type="number" id="storeyCount" min="1" required><br>

    <label>Rooms:</label>
    <input type="number" id="rooms" min="1" required><br>

    <label>Bathrooms:</label>
    <input type="number" id="bathrooms" min="0" required><br>

    <label>Garages:</label>
    <input type="number" id="garages" min="0" required><br>

    <label>Floor Area (sqm):</label>
    <input type="number" id="floorAreaSqm" min="1" required><br>

    <label>Facade:</label>
    <select id="facade">
        <option value="Modern">Modern</option>
    </select><br>

    <label>Company:</label>
    <select id="companyName">
        <option>DreamBuild Homes</option>
        <option>Value Builders</option>
        <option>Premium Living Co.</option>
    </select><br>

    <fieldset>
        <legend>Extras:</legend>
        <label><input type="checkbox" name="extras" value="Built-in Wardrobe"> Built-in Wardrobe</label>
        <label><input type="checkbox" name="extras" value="Double Glazing Windows"> Double Glazing Windows</label>
        <label><input type="checkbox" name="extras" value="Solar Panel Installation (Standard)"> Solar Panels</label>
    </fieldset>


    <button type="submit">Publish to Showcase</button>  <!--tells browser to submit the form-->
    <button type="button" id="addToListBtn">Save Draft</button>
    
</form>

<div id="preview"></div>

<script type="module">
    import { HouseBuilderController } from "../controllers/HouseBuilderController.mjs";
    HouseBuilderController.init();
</script>

</body>
</html>
